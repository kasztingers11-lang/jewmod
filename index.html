<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fosternya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cormorant+SC:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #080808;
      color: #d9d4cc;
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 3rem 1.5rem 110px;
    }
 
    #start-screen {
      position: fixed;
      inset: 0;
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      cursor: pointer;
      gap: 1.2rem;
      transition: opacity 0.8s ease;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; }
 
    .start-name {
      font-family: 'Cormorant SC', serif;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      color: #d9d4cc;
    }
    .start-hint {
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(217, 212, 204, 0.28);
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.28; }
      50%       { opacity: 0.75; }
    }
 
    .container {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
    }
    .container.visible {
      animation: fadeUp 1s ease 0.15s both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .name {
      font-family: 'Cormorant SC', serif;
      font-size: 1.65rem;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: #d9d4cc;
      margin-bottom: 1.6rem;
    }
 
    .bio {
      font-size: 0.87rem;
      font-weight: 300;
      font-style: italic;
      line-height: 2.1;
      color: rgba(217, 212, 204, 0.32);
      text-align: center;
      margin-bottom: 2.6rem;
    }
 
    .line {
      width: 1px;
      height: 28px;
      background: rgba(217, 212, 204, 0.1);
      margin-bottom: 2.6rem;
    }
 
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
 
    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.8rem 1.1rem;
      background: transparent;
      border: 1px solid rgba(217, 212, 204, 0.08);
      color: rgba(217, 212, 204, 0.45);
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: border-color 0.3s, color 0.3s;
    }
    .link-btn:hover {
      border-color: rgba(217, 212, 204, 0.28);
      color: rgba(217, 212, 204, 0.85);
    }
    .link-btn .arrow {
      font-size: 0.6rem;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
    }
    .link-btn:hover .arrow { opacity: 0.4; transform: translateX(3px); }
 
    #audio-status {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      z-index: 200;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(217, 212, 204, 0.18);
      cursor: pointer;
      transition: color 0.3s;
      display: none;
    }
    #audio-status.show { display: block; }
    #audio-status:hover { color: rgba(217, 212, 204, 0.55); }
 
    #walker {
      position: fixed;
      bottom: 14px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(217, 212, 204, 0.08);
      filter: grayscale(100%) brightness(0.65);
      z-index: 100;
      animation: bob 0.5s ease-in-out infinite alternate;
      display: none;
    }
    #walker.show { display: block; }
    #walker img { width: 100%; height: 100%; object-fit: cover; display: block; }
    @keyframes bob {
      from { bottom: 14px; }
      to   { bottom: 20px; }
    }
  </style>
</head>
<body>
 
  <!-- AUDIO ── wrzuc iz-us.mp3 obok tego pliku HTML -->
  <audio id="bg-audio" loop preload="auto">
    <source src="https://raw.githubusercontent.com/kasztingers11-lang/jewmod/refs/heads/main/iz-us.mp3" type="audio/mpeg">
  </audio>
 
  <div id="start-screen" onclick="enter()">
    <div class="start-name">fosternya</div>
    <div class="start-hint">click to enter</div>
  </div>
 
  <div class="container" id="main">
    <h1 class="name">fosternya</h1>
 
    <p class="bio">
      something lingers between the notes<br>
      and the silence that follows.<br>
      collector of textures, moods,<br>
      quiet obsessions, late hours.<br>
      <em>welcome to wherever this is.</em>
    </p>
 
    <div class="line"></div>
 
    <nav class="links">
      <a class="link-btn" href="https://instagram.com/fosternya" target="_blank" rel="noopener">
        instagram <span class="arrow">→</span>
      </a>
      <a class="link-btn" href="https://tiktok.com/@fosternya" target="_blank" rel="noopener">
        tiktok <span class="arrow">→</span>
      </a>
      <a class="link-btn" href="https://discord.com/users/fosternya" target="_blank" rel="noopener">
        discord <span class="arrow">→</span>
      </a>
    </nav>
  </div>
 
  <div id="audio-status" onclick="toggleAudio()">♪ pause</div>
 
  <!-- WALKER IMAGE ── wrzuc swoje zdjecie obok HTML i zmien "ralsei.jpg" na nazwe pliku -->
  <div id="walker">
    <img src="ralsei.jpg" alt="">
  </div>
 
  <script>
    const audio     = document.getElementById('bg-audio');
    const screen    = document.getElementById('start-screen');
    const main      = document.getElementById('main');
    const status    = document.getElementById('audio-status');
    const walkerEl  = document.getElementById('walker');
    let playing = false;
 
    const AUDIO_URL = 'https://raw.githubusercontent.com/kasztingers11-lang/jewmod/refs/heads/main/iz-us.mp3';
 
    function enter() {
      screen.classList.add('hidden');
      setTimeout(() => screen.style.display = 'none', 900);
      main.classList.add('visible');
      walkerEl.classList.add('show');
      status.classList.add('show');
      status.textContent = '♪ loading...';
 
      fetch(AUDIO_URL)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.blob(); })
        .then(blob => {
          audio.src = URL.createObjectURL(blob);
          audio.volume = 0.5;
          audio.loop = true;
          return audio.play();
        })
        .then(() => { playing = true; status.textContent = '♪ pause'; })
        .catch(e => { console.error('audio error:', e); status.textContent = '♪ error'; });
    }
 
    function toggleAudio() {
      if (playing) {
        audio.pause();
        status.textContent = '♪ play';
        playing = false;
      } else {
        audio.play();
        status.textContent = '♪ pause';
        playing = true;
      }
    }
 
    let x = 20, dir = 1, flipped = false;
    function walk() {
      x += 0.8 * dir;
      const max = window.innerWidth - 74;
      if (x >= max) dir = -1;
      if (x <= 0)   dir = 1;
      if ((dir === -1) !== flipped) {
        flipped = dir === -1;
        walkerEl.style.transform = flipped ? 'scaleX(-1)' : 'scaleX(1)';
      }
      walkerEl.style.left = x + 'px';
      requestAnimationFrame(walk);
    }
    walk();
  </script>
 
</body>
</html>
