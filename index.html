<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>xaxaxaxaxaxaxaxaxaxaxa</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    margin: 0;
    padding: clamp(16px, 5vw, 40px);
    text-align: center;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    margin: 0 0 10px;
    letter-spacing: 0.03em;
  }

  h2 {
    font-size: clamp(0.78rem, 3.5vw, 1rem);
    font-weight: normal;
    margin: 0 0 10px;
    line-height: 1.5;
    max-width: 360px;
  }

  p {
    font-size: clamp(0.75rem, 3.5vw, 0.95rem);
    margin: 0 0 24px;
    max-width: 340px;
    line-height: 1.5;
  }

  .img-wrap {
    width: clamp(140px, 50vw, 200px);
    height: clamp(140px, 50vw, 200px);
    margin: 0 auto 28px;
    border: 1px solid #333;
    overflow: hidden;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .img-wrap .img-fallback {
    color: #555;
    font-size: 0.7rem;
    display: none;
  }

  #timer {
    border: 2px solid #fff;
    padding: clamp(12px, 4vw, 18px) clamp(20px, 8vw, 40px);
    font-size: clamp(2rem, 12vw, 3rem);
    font-family: 'Courier New', Courier, monospace;
    letter-spacing: 4px;
    white-space: nowrap;
    min-width: min(340px, 90vw);
  }

  #timer.expired {
    border-color: #f00;
    color: #f00;
  }

  #timer-label {
    font-size: clamp(0.65rem, 2.5vw, 0.75rem);
    margin-top: 8px;
    color: #aaa;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<h1>ARAN, TINA and NAOKIS !</h1>
<h2>exactly when the timer below hits 00:00, the site will be <b>updated</b> and fun things will show there!</h2>
<p>you have exactly 24 hours to apologize! add @cw2l if u wanna say sorry :3</p>

<div class="img-wrap">
  <img
    src="https://files.catbox.moe/hd6mjt.png"
    alt="pic"
    onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
  >
  <span class="img-fallback">image unavailable</span>
</div>

<div id="timer">00:00:00</div>
<div id="timer-label">hours : minutes : seconds</div>

<script>
  const deadline = new Date("2026-05-15T22:40:00+02:00").getTime();
  const timerEl = document.getElementById("timer");

  function pad(n) { return String(n).padStart(2, "0"); }

  function tick() {
    const diff = Math.max(0, deadline - Date.now());
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    timerEl.textContent = pad(h) + ":" + pad(m) + ":" + pad(s);

    if (diff === 0) {
      timerEl.classList.add("expired");
    } else {
      setTimeout(tick, 1000);
    }
  }

  tick();
</script>
</body>
</html>
